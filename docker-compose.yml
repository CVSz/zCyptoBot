version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

  redis:
    image: redis:7

  producer:
    build: .
    command: python -m app.data.producer
    depends_on:
      - kafka

  worker:
    build: .
    command: python -m app.signal.consumer
    depends_on:
      - kafka

  producer_multi:
    build: .
    command: python -m app.data.producer_multi
    depends_on:
      - kafka

  arb_engine:
    build: .
    command: python -m app.arb.engine
    depends_on:
      - kafka
      - redis

  arb_executor:
    build: .
    command: python -m app.arb.executor
    depends_on:
      - kafka
      - redis
