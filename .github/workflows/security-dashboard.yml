name: Security Dashboard

on:
  push:

permissions:
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Semgrep
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep
          semgrep scan --config p/ci --sarif --output semgrep.sarif || true
          [ -f semgrep.sarif ] || printf '{"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[]}' > semgrep.sarif

      - name: Prepare SARIF inputs
        run: |
          mkdir -p sarif
          cp semgrep.sarif sarif/

      - name: Merge SARIF
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          merged = {
              '$schema': 'https://json.schemastore.org/sarif-2.1.0.json',
              'version': '2.1.0',
              'runs': []
          }
          for fp in sorted(Path('sarif').glob('*.sarif')):
              try:
                  data = json.loads(fp.read_text(encoding='utf-8'))
              except Exception:
                  continue
              runs = data.get('runs')
              if isinstance(runs, list):
                  merged['runs'].extend(runs)
          Path('merged.sarif').write_text(json.dumps(merged), encoding='utf-8')
          PY

      - name: Generate HTML
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('merged.sarif').read_text(encoding='utf-8'))
          runs = data.get('runs', [])
          findings = sum(len((r or {}).get('results', []) or []) for r in runs)
          html = f"""<html><body><h1>Security Dashboard</h1><p>Total SARIF runs: {len(runs)}</p><p>Total findings: {findings}</p></body></html>"""
          Path('security-report.html').write_text(html, encoding='utf-8')
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.html
