name: Security Dashboard

on:
  push:
    branches: [main]

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config p/ci --sarif > semgrep.sarif

      - name: Prepare SARIF inputs
        run: |
          mkdir -p sarif
          cp semgrep.sarif sarif/

      - name: Merge SARIF
        run: |
          pip install sarif-tools
          sarif-merge sarif/*.sarif > merged.sarif

      - name: Generate HTML
        run: |
          pip install sarif-html
          sarif-html merged.sarif > security-report.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.html
