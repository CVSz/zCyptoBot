name: Security Dashboard

on:
  push:

permissions:
  contents: read

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Semgrep
        run: |
          python -m pip install --upgrade pip semgrep
          semgrep scan --config p/ci --sarif --output semgrep.sarif || true

      - name: Prepare SARIF inputs
        run: |
          mkdir -p sarif
          cp semgrep.sarif sarif/

      - name: Merge SARIF
        run: |
          pip install sarif-tools
          if command -v sarif-merge >/dev/null 2>&1; then
            sarif-merge sarif/*.sarif > merged.sarif
          elif command -v sarif >/dev/null 2>&1; then
            sarif copy sarif/*.sarif > merged.sarif
          else
            echo "No SARIF merge CLI found; using first SARIF file"
            cp sarif/semgrep.sarif merged.sarif
          fi

      - name: Generate HTML
        run: |
          pip install sarif-tools
          if command -v sarif >/dev/null 2>&1; then
            sarif html merged.sarif > security-report.html
          else
            python -c 'from pathlib import Path; Path("security-report.html").write_text("<html><body><h1>SARIF report generated</h1><p>merged.sarif attached as workflow artifact.</p></body></html>", encoding="utf-8")'
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.html
