name: Sovereign Execution Pipeline

on:
  push:
    branches: ["main", "production"]
  pull_request:
    branches: ["main", "production"]
  schedule:
    - cron: '0 2 * * *' # Deterministic daily anomaly scanning

permissions:
  contents: read
  security-events: write
  id-token: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-resolution-and-audit:
    name: Immutable Supply Chain Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source (No History)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          path: repo

      - name: Setup Go Toolchain
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Resolve Go Manifests
        shell: bash
        run: |
          mapfile -t go_mod_dirs < <(find ./repo -name go.mod -not -path '*/vendor/*' -exec dirname {} \; | sort -u)
          if [ ${#go_mod_dirs[@]} -eq 0 ]; then
            echo "No go.mod files found; skipping Go resolution"
            exit 0
          fi

          for dir in "${go_mod_dirs[@]}"; do
            echo "Resolving Go modules in ${dir}"
            (
              cd "${dir}"
              go mod tidy
              go mod download
            )
          done

      - name: Setup Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Resolve Python Manifests
        shell: bash
        run: |
          python -m venv .ci-venv
          source .ci-venv/bin/activate
          python -m pip install --upgrade pip

          mapfile -t req_files < <(find ./repo -name 'requirements*.txt' -not -path './repo/.ci-venv/*' | sort)
          if [ ${#req_files[@]} -eq 0 ]; then
            echo "No requirements files found; skipping Python resolution"
            exit 0
          fi

          for req in "${req_files[@]}"; do
            echo "Validating Python dependencies in ${req}"
            pip install --dry-run -r "${req}"
          done

      - name: Execute OSV-Scanner CLI
        continue-on-error: false
        shell: bash
        run: |
          curl -sSfL https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64 -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          set +e
          osv-scanner scan --recursive ./repo --no-resolve --format sarif --output-file results.sarif --experimental-exclude g:**/__pycache__/* --experimental-exclude g:audit_simulation/evidence/* --experimental-exclude g:war_simulation/** --experimental-exclude g:dataroom/**
          code=$?
          set -e
          if [ "$code" -ne 0 ] && [ "$code" -ne 1 ] && [ "$code" -ne 130 ]; then
            exit "$code"
          fi

      - name: Upload SARIF Security Intent
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: osv-scanner

  smart-contract-verifier:
    name: Immutable Contract Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Detect Solidity Contracts
        id: solidity
        shell: bash
        run: |
          count=$(find . -name '*.sol' | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Solidity contracts found; skipping Slither"
          fi

      - name: Install Foundry
        if: steps.solidity.outputs.found == 'true'
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1
        with:
          version: nightly

      - name: Execute Slither Static Analyzer
        if: steps.solidity.outputs.found == 'true'
        uses: crytic/slither-action@f197989dea5b53e986d0f88c60a034ddd77ec9a8 # v0.4.0
        continue-on-error: false
        with:
          target: .
          slither-args: '--exclude-dependencies --filter-paths "node_modules|lib|.ci-venv" --sarif results.sarif'

      - name: Upload Contract SARIF
        if: always() && steps.solidity.outputs.found == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: slither-contracts

  architecture-policy-enforcer:
    name: Trust-Minimized Code Policies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Semgrep CI
        uses: returntocorp/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: >-
            p/ci
            p/security-audit
            p/solidity
            p/golang
          generateSarif: '1'

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-architecture
