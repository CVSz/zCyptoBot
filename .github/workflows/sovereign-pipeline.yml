name: Sovereign Execution Pipeline

on:
  push:
    branches: ["main", "production"]
  pull_request:
    branches: ["main", "production"]
  schedule:
    - cron: '0 2 * * *' # Deterministic daily anomaly scanning

permissions:
  contents: read
  security-events: write
  id-token: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-resolution-and-audit:
    name: Immutable Supply Chain Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source (No History)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Go Toolchain
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Resolve Go Manifests
        shell: bash
        run: |
          mapfile -t go_mod_dirs < <(find . -name go.mod -not -path '*/vendor/*' -exec dirname {} \; | sort -u)
          if [ ${#go_mod_dirs[@]} -eq 0 ]; then
            echo "No go.mod files found; skipping Go resolution"
            exit 0
          fi

          for dir in "${go_mod_dirs[@]}"; do
            echo "Resolving Go modules in ${dir}"
            (
              cd "${dir}"
              go mod tidy
              go mod download
            )
          done

      - name: Setup Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Resolve Python Manifests
        shell: bash
        run: |
          python -m venv .ci-venv
          source .ci-venv/bin/activate
          python -m pip install --upgrade pip

          mapfile -t req_files < <(find . -name 'requirements*.txt' -not -path './.ci-venv/*' | sort)
          if [ ${#req_files[@]} -eq 0 ]; then
            echo "No requirements files found; skipping Python resolution"
            exit 0
          fi

          for req in "${req_files[@]}"; do
            echo "Validating Python dependencies in ${req}"
            pip install --dry-run -r "${req}"
          done

      - name: Execute OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        continue-on-error: false
        with:
          scan-args: |-
            --recursive ./
            --format sarif
            --output-file results.sarif
            --call-analysis=all
            --ignore-unfixed

      - name: Upload SARIF Security Intent
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: osv-scanner

  smart-contract-verifier:
    name: Immutable Contract Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Detect Solidity Contracts
        id: solidity
        shell: bash
        run: |
          count=$(find . -name '*.sol' | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No Solidity contracts found; skipping Slither"
          fi

      - name: Install Foundry
        if: steps.solidity.outputs.found == 'true'
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Execute Slither Static Analyzer
        if: steps.solidity.outputs.found == 'true'
        uses: crytic/slither-action@v0.4.0
        continue-on-error: false
        with:
          target: .
          slither-args: '--exclude-dependencies --filter-paths "node_modules|lib|.ci-venv" --sarif results.sarif'

      - name: Upload Contract SARIF
        if: always() && steps.solidity.outputs.found == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          category: slither-contracts

  architecture-policy-enforcer:
    name: Trust-Minimized Code Policies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Semgrep CI
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/ci
            p/security-audit
            p/solidity
            p/golang
          generateSarif: '1'

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-architecture
