name: Full Security Stack

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "30 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: full-security-stack-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript", "go", "actions"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /tool:codeql/language:${{ matrix.language }}

  zap-baseline:
    name: OWASP ZAP Baseline
    runs-on: ubuntu-latest
    steps:
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.13.0
        continue-on-error: true
        with:
          target: ${{ vars.ZAP_TARGET_URL || 'https://example.com' }}
          fail_action: false
          allow_issue_writing: false
          cmd_options: "-J zap-report.json -w zap-report.md"

      - name: Ensure ZAP reports exist
        if: always()
        run: |
          [ -f zap-report.json ] || printf '{"site":[]}' > zap-report.json

      - name: Convert ZAP JSON report to SARIF
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = Path('zap-report.json')
          raw = json.loads(report.read_text()) if report.exists() else {"site": []}
          results = []
          for site in raw.get("site", []):
              for alert in site.get("alerts", []):
                  rule = str(alert.get("pluginid", "zap-alert"))
                  text = alert.get("alert", "ZAP alert detected")
                  risk = (alert.get("riskdesc", "") or "").split()[0].lower()
                  level = "warning" if risk in {"low", "medium", "high"} else "note"
                  site_name = site.get("name") or "https://example.com"
                  instances = alert.get("instances") or [{}]
                  for inst in instances:
                      uri = inst.get("uri") or site_name
                      if not str(uri).startswith(("http://", "https://")):
                          uri = f"https://example.com{uri if str(uri).startswith('/') else '/' + str(uri)}"
                      method = inst.get("method")
                      msg = f"[{method}] {text}" if method else text
                      results.append({
                          "ruleId": rule,
                          "level": level,
                          "message": {"text": msg},
                          "locations": [{
                              "physicalLocation": {
                                  "artifactLocation": {"uri": uri}
                              }
                          }],
                      })

          sarif = {
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                  "tool": {"driver": {"name": "OWASP ZAP Baseline", "informationUri": "https://www.zaproxy.org/"}},
                  "results": results,
              }],
          }
          Path('zap-report.sarif').write_text(json.dumps(sarif))
          PY

      - name: Upload ZAP SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: zap-report.sarif
          category: owasp-zap-baseline

  semgrep-oss:
    name: Semgrep OSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep

      - name: Run Semgrep OSS
        run: semgrep scan --config p/ci --config p/security-audit --sarif --output semgrep.sarif || true

      - name: Ensure Semgrep SARIF exists
        if: always()
        run: |
          [ -f semgrep.sarif ] || printf '{"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[]}' > semgrep.sarif

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-oss

  osv-scanner:
    name: osv-scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install osv-scanner
        run: |
          curl -sSfL https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64 -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner

      - name: Run osv-scanner
        run: |
          set +e
          osv-scanner scan --recursive --format sarif --output-file osv-results.sarif ./
          code=$?
          set -e
          if [ "$code" -ne 0 ] && [ "$code" -ne 1 ] && [ "$code" -ne 130 ]; then
            exit "$code"
          fi

      - name: Ensure OSV SARIF exists
        if: always()
        run: |
          [ -f osv-results.sarif ] || printf '{"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[]}' > osv-results.sarif

      - name: Upload OSV SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner
