name: Full Security Stack

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "30 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: full-security-stack-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        language: ["python", "javascript", "go", "actions"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /tool:codeql/language:${{ matrix.language }}

  owasp-dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: zypto
          path: .
          format: "SARIF"
          out: reports
          args: >
            --enableRetired
            --failOnCVSS 11

      - name: Ensure SARIF exists
        if: always()
        run: |
          mkdir -p reports
          [ -f reports/dependency-check-report.sarif ] || printf '{"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[]}' > reports/dependency-check-report.sarif

      - name: Upload OWASP SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: owasp-dependency-check

  zap-baseline:
    name: ZAP Baseline
    runs-on: ubuntu-latest
    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.13.0
        continue-on-error: true
        with:
          target: ${{ vars.ZAP_TARGET_URL || 'https://example.com' }}
          fail_action: false
          allow_issue_writing: false
          cmd_options: "-J zap-report.json -w zap-report.md"

      - name: Ensure ZAP report exists
        if: always()
        run: |
          [ -f zap-report.json ] || printf '{"site":[]}' > zap-report.json

      - name: Upload ZAP JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: zap-report.json

  semgrep-oss:
    name: Semgrep OSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep

      - name: Run Semgrep OSS
        run: semgrep scan --config p/owasp-top-ten --config p/security-audit --sarif --output semgrep.sarif

      - name: Ensure Semgrep SARIF exists
        if: always()
        run: |
          [ -f semgrep.sarif ] || printf '{"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[]}' > semgrep.sarif

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep-oss

  osv-scanner:
    name: osv-scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install osv-scanner
        run: |
          curl -sSfL https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64 -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner

      - name: Run osv-scanner
        run: |
          set +e
          osv-scanner scan --recursive --format sarif --output-file osv-results.sarif ./
          code=$?
          set -e
          if [ "$code" -ne 0 ] && [ "$code" -ne 1 ] && [ "$code" -ne 130 ]; then
            exit "$code"
          fi

      - name: Ensure OSV SARIF exists
        if: always()
        run: |
          [ -f osv-results.sarif ] || printf '{"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[]}' > osv-results.sarif

      - name: Upload OSV SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner
