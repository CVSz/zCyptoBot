name: OSV-Scan-Production

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'docs/**'
      - 'brand/**'
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '30 4 * * 1' # Weekly scan at 04:30 UTC on Mondays
  workflow_dispatch:

jobs:
  vulnerability-scan:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OSV-Scanner
        id: osv-scan
        uses: google/osv-scanner-action/scan@v2.5.3
        with:
          scan-args: |-
            --recursive
            --format sarif
            --output results.sarif
            ./

      - name: Upload SARIF to Security Tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: osv-scanner
