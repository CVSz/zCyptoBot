name: OSV-Scan-Production

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'docs/**'
      - 'brand/**'
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '30 4 * * 1' # Weekly scan at 04:30 UTC on Mondays
  workflow_dispatch:

jobs:
  vulnerability-scan:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run OSV-Scanner CLI
        id: osv-scan
        shell: bash
        run: |
          curl -sSfL https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64 -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          set +e
          osv-scanner scan --recursive --format sarif --output-file results.sarif --experimental-exclude g:**/__pycache__/* --experimental-exclude g:audit_simulation/evidence/* --experimental-exclude g:war_simulation/** --experimental-exclude g:dataroom/** ./
          code=$?
          set -e
          if [ "$code" -ne 0 ] && [ "$code" -ne 1 ] && [ "$code" -ne 130 ]; then
            exit "$code"
          fi

      - name: Upload SARIF to Security Tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: osv-scanner
