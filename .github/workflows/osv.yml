name: osv-scan

on:
  push:
    branches: [main]
  pull_request:

jobs:
  osv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run OSV Scanner
        uses: google/osv-scanner-action@v2.3.1
        continue-on-error: true
        with:
          scan-args: |
            -r .
