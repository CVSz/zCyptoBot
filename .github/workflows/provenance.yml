name: Provenance

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  provenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: '.'
