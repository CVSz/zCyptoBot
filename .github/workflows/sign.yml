name: Sign Artifacts

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign container image digest (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          echo "No immutable image digest was provided; skipping signature step."
