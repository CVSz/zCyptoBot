name: Security Gate

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: pip install semgrep

      - name: Run Semgrep
        run: semgrep scan --config p/ci --sarif --output semgrep.sarif --error

      - name: Fail on critical
        run: |
          if grep -q "severity\":\"ERROR\"" semgrep.sarif; then exit 1; fi
