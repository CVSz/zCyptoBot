name: Security Gate

on: [pull_request]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: pip install semgrep

      - name: Run Semgrep
        run: semgrep scan --config p/ci --error

      - name: Fail on critical
        run: |
          if grep -q "severity\":\"ERROR\"" semgrep.sarif; then exit 1; fi
