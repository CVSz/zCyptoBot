name: Security Gate

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep

      - name: Run Semgrep (non-blocking)
        run: semgrep scan --config p/ci --sarif --output semgrep.sarif || true

      - name: Summarize gate result
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("semgrep.sarif")
          if not p.exists():
            print("No semgrep.sarif produced")
            raise SystemExit(0)
          data = json.loads(p.read_text(encoding="utf-8"))
          results = data.get("runs", [{}])[0].get("results", [])
          error_count = sum(1 for r in results if r.get("level", "").lower() == "error")
          print(f"Semgrep findings: total={len(results)}, error={error_count}")
          PY
