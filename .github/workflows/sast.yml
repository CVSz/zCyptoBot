name: SAST

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install bandit semgrep

      - name: Bandit
        continue-on-error: true
        run: bandit -r . -x tests,venv,.git

      - name: Semgrep
        continue-on-error: true
        run: semgrep scan --config "p/ci" --error
