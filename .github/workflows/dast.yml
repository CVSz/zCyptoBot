name: DAST

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  zap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create fallback report
        run: |
          cat > zap-report.md <<'EOF'
          ZAP baseline completed in non-blocking mode.
          EOF

      - name: ZAP Baseline
        id: zap
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.13.0
        with:
          target: "https://example.com"
          fail_action: false
          allow_issue_writing: false
          cmd_options: '-J zap-report.json -w zap-report.md'

      - name: Ensure ZAP artifacts exist
        if: always()
        run: |
          [ -f zap-report.json ] || printf '{"site":[]}' > zap-report.json
          [ -f zap-report.md ] || printf 'ZAP baseline completed in non-blocking mode.\n' > zap-report.md
