name: DAST

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  zap:
    runs-on: ubuntu-latest
    services:
      app:
        image: zypto:latest
        ports:
          - 8080:8080
    steps:
      - name: Wait for app
        run: |
          for i in {1..30}; do
            curl -s http://localhost:8080/health && break || sleep 2
          done

      - name: ZAP Baseline
        uses: zaproxy/action-baseline@99b9334bed0a0ff8d797764e76c9ecae53168436 # v0.10.0
        with:
          target: "http://localhost:8080"
