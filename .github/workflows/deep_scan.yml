name: Deep Scan Autofix
on:
  push:
    branches: [ main, develop ]
  pull_request:
permissions:
  contents: read

jobs:
  deep_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: sudo apt-get update && sudo apt-get install -y git curl jq unzip
      - run: python -m pip install --upgrade pip && pip install sentence-transformers scikit-learn networkx astor prometheus-client bandit flake8 requests
      - run: python tools/deep_scan.py --dry-run
