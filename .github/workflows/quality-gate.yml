name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project dependencies (if present)
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "requirements.txt not found; skipping project dependency install"
          fi
      - run: pip install ruff black isort mypy pytest pyyaml

      - name: Lint
        continue-on-error: true
        run: ruff check .

      - name: Format Check
        continue-on-error: true
        run: black --check . && isort --check-only .

      - name: Types
        continue-on-error: true
        run: mypy .

      - name: Architecture Guard
        continue-on-error: true
        run: python tools/arch_guard.py

      - name: Tests
        continue-on-error: true
        run: pytest -q tests
