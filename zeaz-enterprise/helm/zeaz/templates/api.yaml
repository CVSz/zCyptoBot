apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeaz-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zeaz-api
  template:
    metadata:
      labels:
        app: zeaz-api
    spec:
      containers:
        - name: api
          image: yourrepo/zeaz:latest
          ports:
            - containerPort: 8000
