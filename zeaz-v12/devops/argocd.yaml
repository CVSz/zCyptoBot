apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zeaz
spec:
  source:
    repoURL: https://github.com/YOUR_REPO/zeaz
    path: infra/k8s
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: zeaz
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
