name: CI-CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker
        run: docker build -t yourrepo/zeaz:latest .

      - name: Push
        run: |
          echo $DOCKER_PASS | docker login -u $DOCKER_USER --password-stdin
          docker push yourrepo/zeaz:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ArgoCD Sync
        run: |
          curl -X POST https://argocd/api/v1/applications/zeaz/sync \
            -H "Authorization: Bearer $ARGO_TOKEN"
