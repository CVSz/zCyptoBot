apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeaz-aiops
  namespace: zeaz
spec:
  replicas: 1
  selector:
    matchLabels: { app: aiops }
  template:
    metadata:
      labels: { app: aiops }
    spec:
      serviceAccountName: aiops
      containers:
        - name: aiops
          image: yourrepo/zeaz:latest
          command: ["python", "-m", "app.main"]
