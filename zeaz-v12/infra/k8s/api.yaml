apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeaz-api
  namespace: zeaz
spec:
  replicas: 2
  selector:
    matchLabels: { app: zeaz-api }
  template:
    metadata:
      labels: { app: zeaz-api }
    spec:
      containers:
        - name: api
          image: yourrepo/zeaz:latest
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: zeaz-api
  namespace: zeaz
spec:
  selector:
    app: zeaz-api
  ports:
    - port: 8000
      targetPort: 8000
