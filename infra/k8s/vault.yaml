apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  namespace: platform
spec:
  serviceName: vault
  replicas: 3
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.15
          args: ["server"]
