services: 220
observability:
  enabled: true
security:
  networkPolicies: true
autonomy:
  image: ghcr.io/zypto/autonomy-controller:latest
  codeRewriteEnabled: true
  policy:
    maxConcurrentMutations: 2
    requiredChecks:
      - unit-tests
      - policy-scan
    blockedPaths:
      - infra/security
      - .github/workflows
