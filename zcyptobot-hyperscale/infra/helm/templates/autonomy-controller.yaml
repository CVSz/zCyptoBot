apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-autonomy-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autonomy-controller
  template:
    metadata:
      labels:
        app: autonomy-controller
    spec:
      serviceAccountName: {{ .Release.Name }}-autonomy
      containers:
        - name: controller
          image: {{ .Values.autonomy.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: POLICY_PATH
              value: /policies/policy.yaml
            - name: CODE_REWRITE_ENABLED
              value: {{ .Values.autonomy.codeRewriteEnabled | quote }}
          volumeMounts:
            - name: policy
              mountPath: /policies
      volumes:
        - name: policy
          configMap:
            name: {{ .Release.Name }}-autonomy-policy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-autonomy-policy
data:
  policy.yaml: |
{{ toYaml .Values.autonomy.policy | indent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-autonomy
