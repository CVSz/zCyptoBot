apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0025
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0025
  template:
    metadata:
      labels:
        app: service_0025
    spec:
      containers:
      - name: service_0025
        image: ghcr.io/example/service_0025:latest
        ports:
        - containerPort: 80
