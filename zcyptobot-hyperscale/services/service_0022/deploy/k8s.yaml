apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0022
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0022
  template:
    metadata:
      labels:
        app: service_0022
    spec:
      containers:
      - name: service_0022
        image: ghcr.io/example/service_0022:latest
        ports:
        - containerPort: 80
