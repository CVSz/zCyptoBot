apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0002
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0002
  template:
    metadata:
      labels:
        app: service_0002
    spec:
      containers:
      - name: service_0002
        image: ghcr.io/example/service_0002:latest
        ports:
        - containerPort: 80
