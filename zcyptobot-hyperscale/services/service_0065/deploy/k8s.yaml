apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0065
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0065
  template:
    metadata:
      labels:
        app: service_0065
    spec:
      containers:
      - name: service_0065
        image: ghcr.io/example/service_0065:latest
        ports:
        - containerPort: 80
