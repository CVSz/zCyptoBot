apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0125
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0125
  template:
    metadata:
      labels:
        app: service_0125
    spec:
      containers:
      - name: service_0125
        image: ghcr.io/example/service_0125:latest
        ports:
        - containerPort: 80
