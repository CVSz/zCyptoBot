apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0180
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0180
  template:
    metadata:
      labels:
        app: service_0180
    spec:
      containers:
      - name: service_0180
        image: ghcr.io/example/service_0180:latest
        ports:
        - containerPort: 80
