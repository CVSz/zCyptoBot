apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0018
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0018
  template:
    metadata:
      labels:
        app: service_0018
    spec:
      containers:
      - name: service_0018
        image: ghcr.io/example/service_0018:latest
        ports:
        - containerPort: 80
