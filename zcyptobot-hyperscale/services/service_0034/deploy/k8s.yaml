apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0034
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0034
  template:
    metadata:
      labels:
        app: service_0034
    spec:
      containers:
      - name: service_0034
        image: ghcr.io/example/service_0034:latest
        ports:
        - containerPort: 80
