apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0038
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0038
  template:
    metadata:
      labels:
        app: service_0038
    spec:
      containers:
      - name: service_0038
        image: ghcr.io/example/service_0038:latest
        ports:
        - containerPort: 80
