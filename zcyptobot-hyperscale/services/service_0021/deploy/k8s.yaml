apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0021
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0021
  template:
    metadata:
      labels:
        app: service_0021
    spec:
      containers:
      - name: service_0021
        image: ghcr.io/example/service_0021:latest
        ports:
        - containerPort: 80
