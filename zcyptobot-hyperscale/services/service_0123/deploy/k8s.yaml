apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0123
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0123
  template:
    metadata:
      labels:
        app: service_0123
    spec:
      containers:
      - name: service_0123
        image: ghcr.io/example/service_0123:latest
        ports:
        - containerPort: 80
