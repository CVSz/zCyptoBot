apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: service_0013
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: service_0013
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
