apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0030
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0030
  template:
    metadata:
      labels:
        app: service_0030
    spec:
      containers:
      - name: service_0030
        image: ghcr.io/example/service_0030:latest
        ports:
        - containerPort: 80
