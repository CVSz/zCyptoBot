apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0001
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0001
  template:
    metadata:
      labels:
        app: service_0001
    spec:
      containers:
      - name: service_0001
        image: ghcr.io/example/service_0001:latest
        ports:
        - containerPort: 80
