apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0115
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0115
  template:
    metadata:
      labels:
        app: service_0115
    spec:
      containers:
      - name: service_0115
        image: ghcr.io/example/service_0115:latest
        ports:
        - containerPort: 80
