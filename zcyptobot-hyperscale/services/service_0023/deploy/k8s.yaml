apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0023
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0023
  template:
    metadata:
      labels:
        app: service_0023
    spec:
      containers:
      - name: service_0023
        image: ghcr.io/example/service_0023:latest
        ports:
        - containerPort: 80
