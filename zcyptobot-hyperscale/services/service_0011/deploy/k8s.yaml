apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0011
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0011
  template:
    metadata:
      labels:
        app: service_0011
    spec:
      containers:
      - name: service_0011
        image: ghcr.io/example/service_0011:latest
        ports:
        - containerPort: 80
