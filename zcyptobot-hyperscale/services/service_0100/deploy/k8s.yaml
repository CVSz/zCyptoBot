apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0100
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0100
  template:
    metadata:
      labels:
        app: service_0100
    spec:
      containers:
      - name: service_0100
        image: ghcr.io/example/service_0100:latest
        ports:
        - containerPort: 80
