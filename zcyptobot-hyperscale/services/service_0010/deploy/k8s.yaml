apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0010
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0010
  template:
    metadata:
      labels:
        app: service_0010
    spec:
      containers:
      - name: service_0010
        image: ghcr.io/example/service_0010:latest
        ports:
        - containerPort: 80
