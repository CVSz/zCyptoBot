apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0016
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0016
  template:
    metadata:
      labels:
        app: service_0016
    spec:
      containers:
      - name: service_0016
        image: ghcr.io/example/service_0016:latest
        ports:
        - containerPort: 80
