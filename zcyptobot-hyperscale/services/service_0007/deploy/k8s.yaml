apiVersion: apps/v1
kind: Deployment
metadata:
  name: service_0007
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service_0007
  template:
    metadata:
      labels:
        app: service_0007
    spec:
      containers:
      - name: service_0007
        image: ghcr.io/example/service_0007:latest
        ports:
        - containerPort: 80
