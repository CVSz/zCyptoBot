apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zeaz-region-a
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_REPO/zCyptoBot
    targetRevision: main
    path: v1/infra/regions/region-a
  destination:
    server: https://kubernetes.default.svc
    namespace: trading
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
