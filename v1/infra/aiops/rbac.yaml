apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aiops-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aiops-rb
subjects:
- kind: ServiceAccount
  name: aiops-sa
roleRef:
  kind: Role
  name: aiops-role
  apiGroup: rbac.authorization.k8s.io
