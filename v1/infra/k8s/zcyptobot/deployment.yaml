apiVersion: apps/v1
kind: Deployment
metadata:
  name: zcyptobot
  namespace: zcyptobot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zcyptobot
  template:
    metadata:
      labels:
        app: zcyptobot
    spec:
      containers:
        - name: zcyptobot
          image: ghcr.io/example/zcyptobot:latest
          ports:
            - containerPort: 8000
