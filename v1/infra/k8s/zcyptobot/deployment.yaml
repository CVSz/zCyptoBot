apiVersion: apps/v1
kind: Deployment
metadata:
  name: zypto
  namespace: zypto
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zypto
  template:
    metadata:
      labels:
        app: zypto
    spec:
      containers:
        - name: zypto
          image: ghcr.io/example/zypto:latest
          ports:
            - containerPort: 8000
