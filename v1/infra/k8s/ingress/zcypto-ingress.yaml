apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zcypto
  namespace: default
spec:
  tls:
    - hosts:
        - api.zcypto.local
  rules:
    - host: api.zcypto.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zcyptobot
                port:
                  number: 80
