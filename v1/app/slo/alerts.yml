groups:
- name: zeaz
  rules:
  - alert: HighLatency
    expr: rate(api_latency_seconds_sum[1m]) / rate(api_latency_seconds_count[1m]) > 0.5
    for: 2m
    labels:
      severity: critical
    annotations:
      summary: "High API latency"

  - alert: ErrorSpike
    expr: rate(api_requests_total[1m]) > 100
    for: 1m
    labels:
      severity: warning
