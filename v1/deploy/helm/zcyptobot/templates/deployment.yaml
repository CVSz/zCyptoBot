apiVersion: apps/v1
kind: Deployment
metadata:
  name: zypto
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: zypto
  template:
    metadata:
      labels:
        app: zypto
    spec:
      containers:
        - name: zypto
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
