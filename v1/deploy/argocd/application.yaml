apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zypto
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/zypto
    targetRevision: main
    path: deploy/helm/zypto
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: trading
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
