apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zeaz-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zeaz-api
  minReplicas: 5
  maxReplicas: 200
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 65
