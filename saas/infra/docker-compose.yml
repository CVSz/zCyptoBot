version: "3.9"

services:
  backend:
    build: ../backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
    ports:
      - "8000:8000"
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PRICE_PRO=${STRIPE_PRICE_PRO}
      - STRIPE_SUCCESS_URL=http://localhost:3000
      - STRIPE_CANCEL_URL=http://localhost:3000/billing

  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
      - NEXT_PUBLIC_METRICS_WS=ws://localhost:8000/ws/metrics
